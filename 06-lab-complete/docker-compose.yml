# ============================================================
# Production Stack: Nginx LB → 3 Agent instances → Redis
#
# Chạy: docker compose up --scale agent=3
# Test: python test_stateless.py
# ============================================================
version: "3.9"

services:

  # ──────────────────────────────────────
  # Agent — scale ngang
  # ──────────────────────────────────────
  agent:
    build: .
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - agent_net
    # Không expose port ra host — chỉ truy cập qua nginx
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ──────────────────────────────────────
  # Redis — shared state store
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent_net
    volumes:
      - redis-data:/data

  # ──────────────────────────────────────
  # Nginx — Load Balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - agent_net
    restart: unless-stopped

networks:
  agent_net:
    driver: bridge

volumes:
  redis-data:
