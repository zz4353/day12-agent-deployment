events { worker_connections 256; }

http {
    # Docker DNS resolver để tìm agent containers
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        # Docker Compose tự tạo DNS "agent" → round-robin các instances
        server agent:8000;
        keepalive 16;
    }

    server {
        listen 80;

        # Header để thấy rõ instance đang serve request
        add_header X-Served-By $upstream_addr always;

        location / {
            proxy_pass http://agent_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://agent_cluster/health;
            access_log off;
        }

        location /ready {
            proxy_pass http://agent_cluster/ready;
            access_log off;
        }
    }
}
