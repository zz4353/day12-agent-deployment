services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-agent-redis
          property: connectionString

  - type: keyvalue
    name: ai-agent-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
